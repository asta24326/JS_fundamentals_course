<!DOCTYPE html>
<html>
	<head>
		<title>DOM</title>
	</head>
	<body>

		<button>hello</button>
		<!-- Class attribute - labels this component -->
		<button class="js-button">
			Second button
		</button>

		<script>

			// querySelector will get us any element from the page
			console.log(document.querySelector('button').innerHTML);
			
			document.querySelector('button').innerHTML = 'Changed.';

			// (. means that it will look for a class, instead of name 
			// It's called - CLASS SELECTOR')
			console.log(document.querySelector('.js-button'));

			// Convention to call vars containing elements with suffix Element of Elem
			const buttonElement = document.querySelector('.js-button');
			console.log(buttonElement);
		</script>
	</body>
</html>
